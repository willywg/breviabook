name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install weasyprint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libcairo2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy --strict breviabook

      - name: Pytest
        run: uv run pytest -q

      - name: License audit (fail on any GPL/AGPL dependency)
        # --partial-match: exact-name matching misses strings like "GNU AFFERO GPL 3.0"
        # (PyMuPDF) or "GNU Affero General Public License v3" (ebooklib).
        # pyphen is ignored: it is tri-licensed GPLv2+/LGPLv2+/MPL-1.1 (disjunctive) and
        # we elect MPL 1.1 — its GPL branch would false-positive the build.
        run: uv run pip-licenses --partial-match --fail-on "General Public License;GPL" --ignore-packages pyphen
